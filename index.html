<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rosecal — Dashboard de Administración 2026</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
    <style>
        :root {
            --bg-body: #fafafa; --bg-card: #ffffff;
            --border: #e4e4e7;  --border-hover: #d4d4d8;
            --text-main: #18181b; --text-sec: #52525b; --text-muted: #a1a1aa;
            --success: #10b981; --success-bg: rgba(16, 185, 129, 0.1);
            --danger: #ef4444; --danger-bg: rgba(239, 68, 68, 0.1);
            --warning: #f59e0b;
            --radius: 8px; --shadow: 0 1px 2px rgba(0,0,0,0.04);
            --shadow-modal: 0 20px 25px -5px rgba(0,0,0,0.1), 0 10px 10px -5px rgba(0,0,0,0.04);
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Inter', -apple-system, sans-serif; background: var(--bg-body); color: var(--text-main); line-height: 1.5; -webkit-font-smoothing: antialiased; }

        .dashboard-loader { position: fixed; top:0; left:0; width:100%; height:100%; background: rgba(250,250,250,0.8); backdrop-filter: blur(4px); z-index: 2000; display: flex; flex-direction: column; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.2s ease; }
        .dashboard-loader.active { opacity: 1; visibility: visible; }
        .spinner { width: 32px; height: 32px; border: 3px solid var(--border); border-top-color: var(--text-main); border-radius: 50%; animation: spin 0.8s linear infinite; margin-bottom: 12px; }
        @keyframes spin { to { transform: rotate(360deg); } }

        .container { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }

        .status-bar { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px 24px; margin-bottom: 32px; display: flex; justify-content: space-between; align-items: center; }
        .status-left { display: flex; align-items: center; gap: 16px; }
        .brand { font-weight: 700; font-size: 1.1rem; letter-spacing: -0.02em; }
        .status-pill { display: inline-flex; align-items: center; gap: 6px; padding: 4px 10px; border-radius: 99px; font-size: 0.8rem; font-weight: 600; }
        .status-info { color: var(--text-sec); font-size: 0.85rem; display: flex; gap: 16px; }
        .status-info span { padding-left: 16px; border-left: 1px solid var(--border); }
        .status-info span:first-child { border: none; padding: 0; }

        .top-actions { display: flex; gap: 16px; align-items: center; margin-bottom: 32px; flex-wrap: wrap; }
        .date-picker { display: flex; align-items: center; gap: 8px; background: var(--bg-card); border: 1px solid var(--border); padding: 6px 12px; border-radius: var(--radius); }
        .date-picker input { border: none; outline: none; background: transparent; font-family: inherit; font-weight: 500; color: var(--text-main); cursor: pointer; }
        .date-picker label { font-size: 0.8rem; color: var(--text-sec); font-weight: 500; }
        .btn { background: var(--bg-card); border: 1px solid var(--border); color: var(--text-main); padding: 8px 16px; border-radius: var(--radius); font-size: 0.85rem; font-weight: 500; cursor: pointer; box-shadow: var(--shadow); transition: all 0.15s; display: inline-flex; align-items: center; gap: 6px; }
        .btn:hover { background: var(--bg-body); border-color: var(--border-hover); }
        .btn-primary { background: var(--text-main); color: #fff; border-color: var(--text-main); }
        .btn-primary:hover { background: #27272a; border-color: #27272a; }

        .section-header { font-size: 0.85rem; font-weight: 600; color: var(--text-sec); margin-bottom: 16px; text-transform: uppercase; letter-spacing: 0.05em; display: flex; justify-content: space-between; align-items: center;}
        .metrics-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 32px; }
        .metric-card { background: var(--bg-card); border: 1px solid var(--border); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow); }
        .metric-title { font-size: 0.8rem; color: var(--text-sec); margin-bottom: 8px; font-weight: 500; display:flex; justify-content:space-between; align-items:flex-start; }
        .metric-value { font-size: 1.5rem; font-weight: 600; color: var(--text-main); margin-bottom: 8px; letter-spacing: -0.02em; }
        .metric-delta { font-size: 0.8rem; font-weight: 500; display: flex; align-items: center; gap: 4px; }
        
        .cheque-banner { background: #fffbeb; border: 1px solid #fcd34d; border-radius: var(--radius); padding: 16px; margin-bottom: 16px; display: flex; justify-content: space-between; align-items: center; font-size: 0.85rem;}

        .charts-row { display: grid; grid-template-columns: 2fr 1fr; gap: 16px; margin-bottom: 32px; }
        
        .delta-good { color: var(--success); }
        .delta-bad { color: var(--danger); }
        .delta-neutral { color: var(--text-muted); }
        .delta-bg-good { background: var(--success-bg); color: var(--success); padding: 2px 6px; border-radius: 4px; }
        .delta-bg-bad { background: var(--danger-bg); color: var(--danger); padding: 2px 6px; border-radius: 4px; }

        .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.4); backdrop-filter: blur(2px); z-index: 1000; display: flex; align-items: center; justify-content: center; opacity: 0; visibility: hidden; transition: all 0.2s; }
        .modal-overlay.active { opacity: 1; visibility: visible; }
        .modal { background: #fff; width: 90%; max-width: 600px; max-height: 90vh; overflow-y: auto; border-radius: 12px; box-shadow: var(--shadow-modal); padding: 32px; transform: translateY(20px); transition: all 0.2s; border: 1px solid var(--border); }
        .modal-overlay.active .modal { transform: translateY(0); }
        
        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin-bottom: 24px; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 500; margin-bottom: 6px; color: var(--text-sec); }
        .form-group input { width: 100%; padding: 8px 12px; border: 1px solid var(--border); border-radius: 6px; font-family: inherit; }
        .form-group input:focus { outline: none; border-color: var(--text-main); }

        @media(max-width: 1024px) { .metrics-grid { grid-template-columns: repeat(2, 1fr); } .charts-row { grid-template-columns: 1fr; } }
        @media(max-width: 768px) { .status-bar { flex-direction: column; align-items: flex-start; gap: 12px; } .top-actions { flex-direction: column; align-items: stretch; } .form-grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="dashboard-loader" id="dashboardLoader"><div class="spinner"></div><div style="font-weight:500;">Obteniendo y cruzando métricas...</div></div>

<div class="container">
    <div class="status-bar">
        <div class="status-left">
            <span class="brand">ROSECAL</span>
            <span class="status-pill" id="globalStatusPill" style="background:var(--bg-body);"><span style="color:var(--text-sec);">Analizando...</span></span>
        </div>
        <div class="status-info">
            <span id="labelRunway">Meses de caja: --</span>
            <span id="labelUpdate">Actualización: --</span>
        </div>
    </div>

    <div class="top-actions">
        <div class="date-picker">
            <label>MES VIGENTE</label>
            <input type="month" id="globalMonth" onchange="renderDashboard()">
            <label style="margin-left:8px;">VS</label>
            <input type="month" id="compareMonth" onchange="renderDashboard()">
        </div>
        <button class="btn btn-primary" onclick="openModal()">Ingresar Datos Manuales</button>
        <button class="btn" onclick="renderDashboard()">Recargar</button>
    </div>

    <!-- Fila Global de Ventas -->
    <div class="section-header">Panel Global de Ventas</div>
    <div class="metrics-grid" id="rowGlobal"></div>

    <!-- Primera Fila: Salud -->
    <div class="section-header" style="display:flex; align-items:center; flex-wrap:wrap; gap:12px;">
        Salud Financiera 
        <button class="btn btn-primary" style="font-size:0.75rem; padding:6px 16px; display:inline-flex; align-items:center; gap:6px; background:var(--success); border-color:var(--success); border-radius:100px; box-shadow:0 4px 12px rgba(16, 185, 129, 0.2);" onclick="openModal()">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
            Cargar / Actualizar Datos Manuales
        </button>
        <span style="font-size:0.7rem; font-weight:normal; background:var(--bg-body); padding:4px 8px; border-radius:4px; border:1px solid var(--border); margin-left:auto;" id="lblMtdInfo"></span>
    </div>
    <div class="metrics-grid" id="rowHealth"></div>

    <!-- Segunda Fila: Riesgo -->
    <div class="section-header">Riesgo Financiero</div>
    <div id="checkBannerContainer"></div>
    <div class="metrics-grid" id="rowRisk"></div>

    <!-- Tercera Fila: Crecimiento -->
    <div class="section-header">Motor de Crecimiento</div>
    <div class="metrics-grid" id="rowGrowth"></div>

    <!-- Gráficos -->
    <div class="charts-row">
        <div class="metric-card" style="padding:24px;">
            <div class="metric-title" style="margin-bottom:24px; display:flex; justify-content:space-between; align-items:center;">
                Evolución del Negocio
                <select id="chartViewMode" onchange="updateChartView()" style="padding:4px 8px; font-size:0.8rem; border-radius:4px; border:1px solid var(--border); background:var(--bg-body);">
                    <option value="diario">Mensual (Diaria)</option>
                    <option value="mensual">Histórico (Mes a Mes)</option>
                </select>
            </div>
            <div style="height:280px;"><canvas id="chartMain"></canvas></div>
        </div>
        <div class="metric-card" style="padding:24px;">
            <div class="metric-title" style="margin-bottom:24px;">Mapa Caliente de Pedidos (Hora del Día)</div>
            <div style="height:280px;"><canvas id="chartHours"></canvas></div>
        </div>
    </div>

</div>

<!-- Info Modal -->
<div class="modal-overlay" id="infoOverlay" onclick="if(event.target===this)closeInfoModal()">
    <div class="modal" style="max-width:400px; padding:24px;">
        <h3 id="infoTitle" style="margin-bottom:8px; font-size:1.1rem; color:var(--text-main);"></h3>
        <p id="infoDesc" style="font-size:0.85rem; color:var(--text-sec); margin-bottom:16px;"></p>
        <div style="background:var(--bg-body); padding:16px; border-radius:8px; border:1px solid var(--border); font-family:monospace; font-size:0.85rem; line-height:1.7; color:var(--text-sec);" id="infoFormula"></div>
        <button class="btn" style="width:100%; margin-top:20px;" onclick="closeInfoModal()">Entendido</button>
    </div>
</div>

<!-- Forms -->
<div class="modal-overlay" id="modalOverlay" onclick="if(event.target===this)closeModal()">
    <div class="modal">
        <h2 style="font-size:1.2rem; margin-bottom:4px;">Carga Semanal</h2>
        <div class="form-grid" style="margin-top:24px;">
            <div class="form-group"><label>Banco Cta Cte</label><input type="number" id="fBanco"></div>
            <div class="form-group"><label>Saldo MP</label><input type="number" id="fMP"></div>
            <div class="form-group"><label>Efectivo Caja</label><input type="number" id="fCaja"></div>
            <div class="form-group"><label>Inversiones</label><input type="number" id="fInv"></div>
            <div class="form-group"><label>Gastos Operativos (Fijos)</label><input type="number" id="fOps"></div>
            <div class="form-group"><label>Proveedores</label><input type="number" id="fDeudaProv"></div>
            <div class="form-group"><label>Servicios</label><input type="number" id="fDeudaServ"></div>
            <div class="form-group"><label>Mercado Pago Créditos</label><input type="number" id="fDeudaMP"></div>
            <div class="form-group"><label>Inversión Ads</label><input type="number" id="fAds"></div>
            <div class="form-group"><label>Costo Agencia/Marketing</label><input type="number" id="fMkt"></div>
            <div class="form-group"><label>Ventas Corporativas</label><input type="number" id="fCorp"></div>
        </div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:32px;">
            <button class="btn" onclick="closeModal()">Cancelar</button>
            <button class="btn btn-primary" id="btnSave" onclick="saveData()">Guardar Datos</button>
        </div>
    </div>
</div>

<!-- Modal Listado Completo Cheques -->
<div class="modal-overlay" id="chequesModal">
    <div class="modal" style="max-width:600px; padding:24px;">
        <h3 style="margin-bottom:16px; font-size:1.1rem; color:var(--text-main);">Listado Completo: Cheques Activos</h3>
        <div id="chequesListContainer" style="max-height:60vh; overflow-y:auto;"></div>
        <div style="display:flex; justify-content:flex-end; gap:12px; margin-top:24px;">
            <button class="btn btn-primary" onclick="document.getElementById('chequesModal').classList.remove('active')">Cerrar</button>
        </div>
    </div>
</div>

<script>
const APPS_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbzBzq0RFa1kfNKmLx7IoeeWK3BFR8cA4hcYESpy56kNs6AGKuYIxJ1FGET40IrNUEs5/exec';
const LOCALE = 'es-AR', CUR = 'ARS';
let currentData = null, charts = {};

function fmt(v, type='cur') {
    if(type==='cur') return new Intl.NumberFormat(LOCALE,{style:'currency',currency:CUR,minimumFractionDigits:0,maximumFractionDigits:0}).format(v);
    if(type==='num') return new Intl.NumberFormat(LOCALE).format(v);
    if(type==='pct') return v.toFixed(1)+'%';
    if(type==='dec') return v.toFixed(1);
    return v;
}
function formatDDMMAA(isoString) {
    if(!isoString) return '';
    let p = isoString.split('T')[0].split('-');
    if(p.length===3) return p[2]+'/'+p[1]+'/'+p[0].slice(2);
    return isoString;
}
function calcDelta(cur,prev) { return prev ? ((cur-prev)/Math.abs(prev)*100) : 0; }

async function fetchAPI(month) {
    let url = APPS_SCRIPT_URL + '?action=read' + (month ? '&month='+month : '');
    try { const r = await fetch(url); return await r.json(); } catch(e) { console.error(e); return { error:true }; }
}

async function renderDashboard() {
    document.getElementById('dashboardLoader').classList.add('active');
    
    let m1 = document.getElementById('globalMonth').value;
    let m2 = document.getElementById('compareMonth').value;
    if(!m1) {
        let dDate = new Date();
        m1 = dDate.getFullYear() + '-' + String(dDate.getMonth()+1).padStart(2,'0');
        document.getElementById('globalMonth').value = m1;
    }
    
    const [d1, d2] = await Promise.all([ fetchAPI(m1), m2 ? fetchAPI(m2) : Promise.resolve(null) ]);
    document.getElementById('dashboardLoader').classList.remove('active');
    
    // Fallback if Apps Script is still running old logic
    if(!d1 || d1.error || !d1.orders) { alert('Aún no configuraste el script V5 en Google Sheets o está actualizándose en Vercel. Ve al paso "Configurar Hojas", y luego Publicá como "Nueva versión".'); return; }
    currentData = d1;
    
    coreLogic(d1, d2, m1);
}

function coreLogic(d1, d2, m1) {
    const today = new Date();
    const isOngoingMonth = (today.getFullYear() + '-' + String(today.getMonth()+1).padStart(2,'0') === m1);
    // Para la comparativa, usamos MTD (Month-to-Date). Cortamos el mes de comparacion al mismo dia que el actual.
    const dayLimit = isOngoingMonth ? today.getDate() : 31;
    
    document.getElementById('lblMtdInfo').innerText = isOngoingMonth ? `Comparativa a día ${dayLimit} (MTD)` : `Comparativa a mes completo`;

    function buildTxStats(ordersList, limit) {
        let validOrders = 0, brutas = 0, pCobrados = 0, pNoCobrados = 0, anulados = 0;
        let pCobradosVal = 0;
        let hourly = new Array(24).fill(0);
        let daily = {};
        
        const list = ordersList || [];
        for(let o of list) {
            let od = new Date(o.date);
            let day = od.getDate();
            if(day <= limit) {
                if(o.status === 'ANULADO') {
                    anulados++;
                } else {
                    validOrders++;
                    brutas += o.amount;
                    if(o.status === 'COBRADO') { pCobrados++; pCobradosVal += o.amount; }
                    else pNoCobrados++;
                    
                    let dateKey = od.toISOString().split('T')[0];
                    daily[dateKey] = (daily[dateKey]||0) + o.amount;
                    hourly[od.getHours()]++;
                }
            }
        }
        return { validOrders, brutas, pCobrados, pNoCobrados, anulados, pCobradosVal, daily, hourly };
    }

    const m = d1.manual || {};
    window.lastManualData = m;
    const sl = d1.sales || {};
    const pm = (d2 ? d2.manual : (m.prev || {}));
    
    const curStats = buildTxStats(d1.orders, dayLimit);
    const prevStats = d2 ? buildTxStats(d2.orders, dayLimit) : { validOrders:0, brutas:0, pCobrados:0, pNoCobrados:0, anulados:0 };

    /* 1. CALCULOS CAJA Y SALUD */
    const cajaActual = (m.bancoCuenta||0) + (m.saldoMP||0) + (m.efectivoCaja||0) + (m.inversiones||0);
    const prevCajaActual = (pm.bancoCuenta||0) + (pm.saldoMP||0) + (pm.efectivoCaja||0) + (pm.inversiones||0);
    const cajaAcumulada = cajaActual + prevCajaActual; 
    
    const impAds = m.inversionPublicidad||0, gMkt = m.gastoMarketing||0, ops = m.gastosOperativos||0;
    const invVsVentas = curStats.brutas > 0 ? (impAds / curStats.brutas)*100 : 0;
    
    const gananciaNeta = (curStats.pCobradosVal) - (sl.costoBeato||0) - (sl.costoLogistica||0) - impAds - gMkt - ops;
    const margenNeto = curStats.pCobradosVal > 0 ? (gananciaNeta / curStats.pCobradosVal)*100 : 0;

    const burnRate = ops + impAds + gMkt;
    const runway = burnRate > 0 ? (cajaActual / burnRate) : 99;

    document.getElementById('labelRunway').innerHTML = `Meses de caja: <strong style="color:var(--text-main);">${fmt(runway,'dec')}</strong>`;
    document.getElementById('labelUpdate').innerHTML = `Actualización: <strong style="color:var(--text-main);">En tiempo real</strong>`;

    let stText = 'ESTABLE', stCol = 'var(--warning)';
    const dVentas = calcDelta(curStats.brutas, prevStats.brutas);
    if(dVentas > 5) { stText = 'CRECIENDO'; stCol = 'var(--success)'; }
    if(dVentas < -5) { stText = 'ALERTA VENTAS'; stCol = 'var(--danger)'; }
    document.getElementById('globalStatusPill').innerHTML = `<span style="background:${stCol};width:8px;height:8px;border-radius:50%;"></span> <span style="color:${stCol};">${stText}</span>`;

    // Global Ventas
    const glob = d1.globalStats || { totalBruto:0, totalCobrado:0, deudaMoto:0, deudaContraReembolso:0 };
    drawGrid('rowGlobal', [
        { label: 'Ventas de Este Mes', val: curStats.brutas, prev: prevStats.brutas, t: 'cur',
          info: { desc:'Facturación MTD ignorando anulados.', calc:`Las ventas brutas acumuladas sumando todos los reportes del mes.`} },
        { label: 'Cobradas Este Mes', val: curStats.pCobradosVal, prev: 0, t: 'cur', hideDelta:true,
          info: { desc:'Dinero efectivamente cobrado este mes.', calc:`Total con status COBRADO sobre los pedidos de este mes.`} },
        { label: 'Facturación Histórica', val: glob.totalBruto, prev: 0, t: 'cur', hideDelta:true,
          info: { desc:'Ventas totales netas desde la creación.', calc:`Suma global historica de todos los meses de la empresa ignorando cancelados.`} }
    ]);

    drawGrid('rowHealth', [
        { label: 'Caja Total (Acumulada a la fecha)', val: cajaAcumulada, prev: 0, t: 'cur', hideDelta:true,
          info: { desc:'Suma de la caja con el mes anterior.', calc:`Caja Actual: ${fmt(cajaActual)}<br>Caja Anterior: ${fmt(prevCajaActual)}<hr/>Acumulado = ${fmt(cajaAcumulada)}` } },
        { label: 'Caja Actual (Mes en curso)', val: cajaActual, prev: 0, t: 'cur', hideDelta:true,
          info: { desc:'Dinero en tiempo real ingresado en Datos Manuales.', calc:`Banco: ${fmt(m.bancoCuenta||0)}<br>MP: ${fmt(m.saldoMP||0)}<br>Efectivo: ${fmt(m.efectivoCaja||0)}<br>Inversiones: ${fmt(m.inversiones||0)}<hr/>Total: ${fmt(cajaActual)}`} },
        { label: 'Inversión sobre Facturado', val: invVsVentas, prev: 0, t: 'pct', hideDelta:true,
          info: { desc:'Mide cuán eficiente es tu gasto en pauta. Recomendado <= 10%.', calc:`Inversión en Publicidad: ${fmt(impAds)}<br>Total Facturado (Bruto): ${fmt(curStats.brutas)}<hr/>Proporción = ${fmt(invVsVentas,'dec')}%` } },
        { label: 'Margen Operativo', val: margenNeto, prev: 0, t: 'pct', hideDelta:true,
          info: { desc:'Porcentaje de rentabilidad pura versus Ventas con status COBRADO.', calc:`Ventas Cobradas: ${fmt(curStats.pCobradosVal)}<br>- Inversión Publicidad & Marketing: ${fmt(impAds+gMkt)}<br>- Gastos Operativos Fijos: ${fmt(ops)}<br>- Costo Beato: ${fmt(sl.costoBeato)}<br>- Costo Logística: ${fmt(sl.costoLogistica)}<hr/>Ganancia Libre = ${fmt(gananciaNeta)}<br>Margen = ${fmt(margenNeto,'dec')}%` } }
    ]);

    /* 2. RIESGO Y CHEQUES */
    const deudasProv = (m.deudaProveedores||0) + (m.deudaServicios||0) + (m.deudaMP||0);
    const chequesEmitidosActivos = d1.totalChequesActivos || 0;
    
    // Calcular deuda clientes distribuida y porcentaje si está disponible
    const currentDeudaClientes = glob.totalDeuda||0;
    const activos = cajaActual + currentDeudaClientes;
    const pasivos = deudasProv + chequesEmitidosActivos;
    const posNeta = activos - pasivos;

    drawGrid('rowRisk', [
        { label: 'Deuda Clientes', val: currentDeudaClientes, prev: 0, t: 'cur', inv: true, hideDelta:true, 
          info: { desc:'Dinero en la calle de los que no fueron ni cobrados ni anulados.', calc:`Calculado sumando toda la columna histórico que no esté en status COBRADO ni ANULADO.<br>Total: ${fmt(currentDeudaClientes)}`} },
        { label: 'Cheques Emitidos', val: chequesEmitidosActivos, prev: 0, t: 'cur', inv: true, hideDelta:true,
          info: { desc:'Total de pasivos diferidos.', calc:`Cheques (ACTIVO/VENCIDO): ${fmt(chequesEmitidosActivos)}`} },
        { label: 'Posición Neta (Liquidez)', val: posNeta, prev: 0, t: 'cur', hideDelta:true,
          info: { desc:'Tus Activos reales restando TODOS tus pasivos exigibles y futuros.', calc:`Activos (Caja + Deudas clientes): ${fmt(activos)}<br>Pasivos (Deuda Prov + Cheques): ${fmt(pasivos)}<hr/>Posición: ${fmt(posNeta)}`} }
    ]);

    // Próximos cheques
    const cl = d1.chequesActivos || [];
    let upcHtml = '', vencidosHtml = '';
    if(cl.length > 0) {
        cl.sort((a,b) => new Date(a.vencimiento) - new Date(b.vencimiento));
        
        const getDaysStr = (venc) => {
            const todayTz = new Date(today.getFullYear(), today.getMonth(), today.getDate()).getTime();
            const vencTz = new Date(venc + 'T12:00:00').getTime();
            const diffDays = Math.round((vencTz - todayTz)/(1000*60*60*24));
            if(diffDays < 0) return `hace ${Math.abs(diffDays)} días (VENCIDO)`;
            if(diffDays === 0) return `Hoy`;
            if(diffDays === 1) return `Mañana`;
            return `en ${diffDays} días`;
        };

        const activosList = cl.filter(c => c.estado === 'ACTIVO');
        const vencidosList = cl.filter(c => c.estado === 'VENCIDO');

        if(activosList.length > 0) {
            const px = activosList[0];
            const pxNext = activosList.length > 1 ? activosList[1] : null;

            const str1 = getDaysStr(px.vencimiento);
            const deltaCheque = cajaActual - px.monto;
            
            let nextText = '';
            if(pxNext) {
                nextText = `<div style="font-size:0.85rem; color:var(--text-sec); margin-top:12px; border-top:1px solid rgba(0,0,0,0.05); padding-top:12px;">
                    Siguiente pago a liquidar <strong>${getDaysStr(pxNext.vencimiento)}</strong> (${formatDDMMAA(pxNext.vencimiento)}): a nombre de <span style="color:var(--text-main); font-weight:600;">${pxNext.proveedor}</span> por <strong>${fmt(pxNext.monto)}</strong>.
                </div>`;
            }

            upcHtml = `<div class="cheque-banner" style="display:block;">
                <div style="display:flex; justify-content:space-between; width:100%; align-items:center; flex-wrap:wrap; gap:12px;">
                    <div><strong>Próximo cheque a liquidar ${str1} </strong> (${formatDDMMAA(px.vencimiento)}): A nombre de ${px.proveedor} </div>
                    <div style="font-size:1.1rem; font-weight:700;">Monto: ${fmt(px.monto)}</div>
                    <div style="color:${deltaCheque >= 0 ? 'var(--success)' : 'var(--danger)'}; font-weight:600;">ESTADO CAJA: ${deltaCheque >= 0 ? 'CUBIERTO (Sobran '+fmt(deltaCheque)+')' : 'FALTAN '+fmt(Math.abs(deltaCheque))}</div>
                </div>
                ${nextText}
                <div style="margin-top:16px; border-top:1px solid rgba(0,0,0,0.05); padding-top:12px; text-align:right;">
                    <button class="btn" style="background:var(--bg-body); border-color:var(--border);" onclick="openAllChequesModal()">Ver todos los próximos listos para procesar</button>
                </div>
            </div>`;
        }

        window.lastActiveChequesList = activosList;

        if(vencidosList.length > 0) {
            vencidosHtml = `<div style="margin-bottom:16px;">
                <div style="font-size:0.85rem; font-weight:600; color:var(--danger); margin-bottom:8px; text-transform:uppercase;">Cheques Vencidos a Regularizar</div>
                ${vencidosList.map(venc => `
                    <div style="background:#fef2f2; border:1px solid #fca5a5; border-radius:var(--radius); padding:12px 16px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
                        <div>
                            <span style="font-weight:600; color:var(--danger);">${venc.proveedor}</span> — 
                            <span style="color:var(--text-sec); font-size:0.85rem;">Venció el ${formatDDMMAA(venc.vencimiento)}</span>
                            <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">Cheque Nº: ${venc.numero}</div>
                        </div>
                        <div style="display:flex; align-items:center; gap:16px;">
                            <span style="font-weight:700; font-size:1.1rem; color:var(--text-main);">${fmt(venc.monto)}</span>
                            <button class="btn btn-primary" style="background:var(--success); border-color:var(--success); padding:6px 12px; font-size:0.8rem;" onclick="markChequeAsPaid('${venc.numero}')">Marcar Pagado</button>
                        </div>
                    </div>
                `).join('')}
            </div>`;
        }
    }
    document.getElementById('checkBannerContainer').innerHTML = vencidosHtml + upcHtml;

    /* 3. CRECIMIENTO Y VENTAS MTD */
    const tktPromo = curStats.validOrders > 0 ? (curStats.brutas / curStats.validOrders) : 0;
    const ptktPromo = prevStats.validOrders > 0 ? (prevStats.brutas / prevStats.validOrders) : 0;
    
    let pctCobrado = 0, pctNo = 0;
    if(curStats.validOrders > 0) {
        pctCobrado = (curStats.pCobrados / curStats.validOrders) * 100;
        pctNo = 100 - pctCobrado;
    }
    
    const pieHtml = `<div style="display:flex; align-items:center; gap:12px;">
        <div style="width:36px; height:36px; border-radius:50%; background:conic-gradient(var(--success) ${pctCobrado}%, var(--danger) 0); flex-shrink:0;"></div>
        <div style="display:flex; flex-direction:column; font-size:0.8rem; line-height:1.2;">
            <span style="color:var(--success); font-weight:700;">${pctCobrado.toFixed(0)}% COBRADO</span>
            <span style="color:var(--danger); font-weight:700;">${pctNo.toFixed(0)}% PENDIENTE</span>
        </div>
    </div>`;

    drawGrid('rowGrowth', [
        { label: 'Ventas del Mes (Brutas)', val: curStats.brutas, prev: prevStats.brutas, t: 'cur',
          info: { desc:'Facturación MTD ignorando anulados.', calc:`Hasta fecha ${dayLimit}:<br>Mes evaluado: ${fmt(curStats.brutas)}<br>Mes comparación: ${fmt(prevStats.brutas)}`} },
        { label: 'Pedidos Nuevos (Unid.)', val: curStats.validOrders, prev: prevStats.validOrders, t: 'num',
          info: { desc:'Unidades operadas válidas', calc:`Total MTD: ${fmt(curStats.validOrders,'num')} pedidos.`} },
        { label: 'Ticket Promedio', val: tktPromo, prev: ptktPromo, t: 'cur',
          info: { desc:'Facturación / Cantidad válida', calc:`Facturacion: ${fmt(curStats.brutas)} / Pedidos: ${fmt(curStats.validOrders,'num')}<hr/>Ticket = ${fmt(tktPromo)}`} },
        { label: 'Volumen: Estados', val: pieHtml, prev: 0, t: 'raw', hideDelta:true,
          info: { desc:'Relación porcentual de terminados vs no pagados.', calc:`Cobrados: ${fmt(curStats.pCobrados,'num')}<br>Deudas o Varios: ${fmt(curStats.pNoCobrados,'num')}`} },
        { label: 'Pedidos Anulados', val: curStats.anulados, prev: prevStats.anulados, t: 'num', inv: true,
          info: { desc:'Volumen de cancelaciones.', calc:`Mismos anulados a esta misma fecha limitados a MTD.`} }
    ], 'repeat(5, 1fr)'); // overrides 4 columns to fit 5

    /* 4. GRAFICOS */
    const ttip = { backgroundColor:'#18181b', titleColor:'#fff', padding:10, cornerRadius:4, bodyFont:{family:'Inter'} };
    Object.values(charts).forEach(c=>c.destroy());
    
    // Reservamos data en window para re-dibujar
    window._chartData = {
        daysArr: Object.keys(curStats.daily).sort(),
        dailyData: Object.keys(curStats.daily).sort().map(d => curStats.daily[d]),
        monthProps: glob.porMes || {}
    };

    updateChartView();

    // Heatmap / Hourly
    const hourLabels = Array.from({length:24}, (_,i) => i+'hs');
    charts.hours = new Chart(document.getElementById('chartHours'), {
        type: 'bar', data: {
            labels: hourLabels,
            datasets: [{ label:'Pedidos en esta hora', data:curStats.hourly, backgroundColor: '#d4d4d8', hoverBackgroundColor:'#10b981', borderRadius: 4 }]
        }, options: { responsive:true, maintainAspectRatio:false, plugins:{ legend:{display:false}, tooltip:ttip }, scales:{ x:{grid:{display:false}}, y:{grid:{color:'#f4f4f5'}} } }
    });
}

function drawGrid(id, items, colsRule=null) {
    if(colsRule) document.getElementById(id).style.gridTemplateColumns = colsRule;
    window.lastGridItems = window.lastGridItems || {};
    window.lastGridItems[id] = items;
    
    document.getElementById(id).innerHTML = items.map((k, idx) => {
        const d = (k.hideDelta || !k.prev) ? 0 : calcDelta(k.val, k.prev);
        let dHtml = '', dClass = 'delta-neutral';
        if(d !== 0) {
            const isGood = k.inv ? d < 0 : d > 0;
            dClass = isGood ? 'delta-bg-good' : 'delta-bg-bad';
            dHtml = `<span class="${dClass}">${d>0?'↑':'↓'} ${fmt(Math.abs(d),'pct')}</span>`;
        } else if(!k.hideDelta) { dHtml = `<span class="delta-neutral">-</span>`; }
        
        let iconHtml = k.info ? `<svg onclick="openInfoMetric(${idx}, '${id}')" width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="cursor:pointer; color:var(--text-muted);"><circle cx="12" cy="12" r="10"></circle><line x1="12" y1="16" x2="12" y2="12"></line><line x1="12" y1="8" x2="12.01" y2="8"></line></svg>` : '';
        
        let valOutput = k.t === 'raw' ? k.val : (k.t==='num'&&k.label.includes('Cobrado /') ? k.val : fmt(k.val, k.t));
        
        return `<div class="metric-card">
            <div class="metric-title">${k.label} ${iconHtml}</div>
            <div class="metric-value">${valOutput}</div>
            <div class="metric-delta">${dHtml} <div style="margin-left:auto; font-size:0.75rem;">${k.info && k.info.calc.includes('Mayoría Pendiente') ? '<span style="color:var(--danger)">CRÍTICO</span>' : ''}</div></div>
        </div>`;
    }).join('');
}

function openModal() { 
    if(window.lastManualData) {
        document.getElementById('fBanco').value = window.lastManualData.bancoCuenta || '';
        document.getElementById('fMP').value = window.lastManualData.saldoMP || '';
        document.getElementById('fCaja').value = window.lastManualData.efectivoCaja || '';
        document.getElementById('fInv').value = window.lastManualData.inversiones || '';
        document.getElementById('fOps').value = window.lastManualData.gastosOperativos || '';
        document.getElementById('fDeudaProv').value = window.lastManualData.deudaProveedores || '';
        document.getElementById('fDeudaServ').value = window.lastManualData.deudaServicios || '';
        document.getElementById('fDeudaMP').value = window.lastManualData.deudaMP || '';
        document.getElementById('fAds').value = window.lastManualData.inversionPublicidad || '';
        document.getElementById('fMkt').value = window.lastManualData.gastoMarketing || '';
        document.getElementById('fCorp').value = window.lastManualData.ventasCorporativas || '';
    }
    document.getElementById('modalOverlay').classList.add('active'); 
}
function closeModal() { document.getElementById('modalOverlay').classList.remove('active'); }
function openInfoMetric(idx, gId) {
    const item = window.lastGridItems[gId][idx];
    document.getElementById('infoTitle').innerText = item.label;
    document.getElementById('infoDesc').innerHTML = item.info.desc;
    document.getElementById('infoFormula').innerHTML = item.info.calc;
    document.getElementById('infoOverlay').classList.add('active');
}
function closeInfoModal() { document.getElementById('infoOverlay').classList.remove('active'); }
async function saveData() {
    document.getElementById('btnSave').innerText = 'Guardando...';
    const v = (id) => Number(document.getElementById(id).value) || 0;
    const p = new URLSearchParams({
        action: 'write', bancoCuenta: v('fBanco'), saldoMP: v('fMP'), efectivoCaja: v('fCaja'), inversiones: v('fInv'), gastosOperativos: v('fOps'),
        deudaProveedores: v('fDeudaProv'), deudaServicios: v('fDeudaServ'), deudaMP: v('fDeudaMP'),
        inversionPublicidad: v('fAds'), gastoMarketing: v('fMkt'), ventasCorporativas: v('fCorp')
    });
    try {
        await fetch(APPS_SCRIPT_URL + '?' + p.toString(), {mode:'no-cors'});
        closeModal();
        setTimeout(()=>renderDashboard(), 1500);
    } catch(e) { alert('Error al guardar.'); }
    document.getElementById('btnSave').innerText = 'Guardar Datos';
}

function updateChartView() {
    if(charts.main) charts.main.destroy();
    
    const mode = document.getElementById('chartViewMode').value;
    const cData = window._chartData;
    const ttip = { backgroundColor:'#18181b', titleColor:'#fff', padding:10, cornerRadius:4, bodyFont:{family:'Inter'} };
    
    if(mode === 'diario') {
        charts.main = new Chart(document.getElementById('chartMain'), {
            type: 'line', data: {
                labels: cData.daysArr.map(d => formatDDMMAA(d)),
                datasets: [{ label:'Facturación Diaria MTD', data:cData.dailyData, borderColor:'#18181b', backgroundColor:'rgba(24,24,27,0.05)', fill:true, borderWidth:2, tension:0.2, pointRadius:4, pointHoverRadius:6 }]
            }, options: { responsive:true, maintainAspectRatio:false, plugins:{ tooltip:ttip, legend:{display:false} }, scales:{ x:{grid:{display:false}}, y:{grid:{color:'#f4f4f5'}, ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k'}} } }
        });
    } else {
        const sortedMonths = Object.keys(cData.monthProps).sort();
        const dataBruta = sortedMonths.map(m => cData.monthProps[m].bruto);
        const dataCobrada = sortedMonths.map(m => cData.monthProps[m].cobrado);
        
        charts.main = new Chart(document.getElementById('chartMain'), {
            type: 'bar', data: {
                labels: sortedMonths,
                datasets: [
                    { label:'Total Bruto', data:dataBruta, backgroundColor:'#18181b', borderRadius:4 },
                    { label:'Efectivizado', data:dataCobrada, backgroundColor:'#10b981', borderRadius:4 }
                ]
            }, options: { responsive:true, maintainAspectRatio:false, plugins:{ tooltip:ttip, legend:{display:true, position:'bottom'} }, scales:{ x:{grid:{display:false}}, y:{grid:{color:'#f4f4f5'}, ticks:{callback:v=>'$'+(v/1000).toFixed(0)+'k'}} } }
        });
    }
}

function openAllChequesModal() {
    const actList = window.lastActiveChequesList || [];
    const html = actList.map(venc => `
        <div style="background:var(--bg-body); border:1px solid var(--border); border-radius:var(--radius); padding:12px 16px; margin-bottom:8px; display:flex; justify-content:space-between; align-items:center;">
            <div>
                <span style="font-weight:600; color:var(--text-main);">${venc.proveedor}</span> — 
                <span style="color:var(--text-sec); font-size:0.85rem;">Vence el ${formatDDMMAA(venc.vencimiento)}</span>
                <div style="font-size:0.75rem; color:var(--text-muted); margin-top:4px;">Cheque Nº: ${venc.numero}</div>
            </div>
            <div style="font-weight:700; font-size:1.1rem; color:var(--text-main);">${fmt(venc.monto)}</div>
        </div>
    `).join('');
    document.getElementById('chequesListContainer').innerHTML = html || '<div style="color:var(--text-sec);">No hay cheques activos listados.</div>';
    document.getElementById('chequesModal').classList.add('active');
}

async function markChequeAsPaid(numero) {
    if(!confirm('¿Estás seguro que querés marcar el cheque Nº ' + numero + ' como PAGADO en la hoja de cálculo?')) return;
    document.getElementById('dashboardLoader').classList.add('active');
    const p = new URLSearchParams({ action: 'update_cheque', numero: numero, nuevoEstado: 'PAGADO' });
    try {
        await fetch(APPS_SCRIPT_URL + '?' + p.toString(), {mode:'no-cors'});
        setTimeout(()=>renderDashboard(), 1500);
    } catch(e) { 
        alert('Hubo un error al comunicarse con la hoja.'); 
        document.getElementById('dashboardLoader').classList.remove('active'); 
    }
}

renderDashboard();
setInterval(renderDashboard, 60*60*1000);
</script>
</body>
